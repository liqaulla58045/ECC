databases:
  - name: ecc-db
    databaseName: ecc_db
    user: ecc_user
    plan: free

services:
  # ── Main web service: API + serves frontend build ──────────────────────
  - type: web
    name: ecc-api
    runtime: node
    plan: free
    buildCommand: >
      cd frontend && npm install && npm run build &&
      cd ../backend/api && npm install && npm run build &&
      mkdir -p dist/public && cp -r ../../frontend/dist/. dist/public/
    startCommand: node backend/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ecc-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ALLOWED_ORIGINS
        value: https://ecc-api.onrender.com
      - key: MCP_SERVER_URL
        value: https://ecc-mcp.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false   # Set manually in Render dashboard

  # ── MCP browser-automation service ─────────────────────────────────────
  - type: web
    name: ecc-mcp
    runtime: node
    plan: starter          # Free tier may timeout during Playwright install; use starter
    buildCommand: cd backend/mcp-server && npm install && npm run build
    startCommand: node backend/mcp-server/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ANTHROPIC_API_KEY
        sync: false
