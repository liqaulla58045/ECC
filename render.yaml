databases:
  - name: ecc-db
    databaseName: ecc_db
    user: ecc_user
    plan: free

services:
  # ── Main web service: API + serves frontend build ──────────────────────
  - type: web
    name: ecc-api
    runtime: node
    plan: free
    buildCommand: |
      set -eu
      echo "[ecc-api] Building frontend..."
      cd frontend
      npm install
      npm run build

      if [ ! -f dist/index.html ]; then
        echo "[ecc-api] ERROR: frontend build did not produce dist/index.html"
        exit 1
      fi

      echo "[ecc-api] Building backend API..."
      cd ../backend/api
      npm install
      npm run build

      if [ ! -d dist ]; then
        echo "[ecc-api] ERROR: backend build did not produce dist directory"
        exit 1
      fi

      echo "[ecc-api] Copying frontend dist into backend/api/dist/public..."
      mkdir -p dist/public
      rm -rf dist/public/*
      cp -a ../../frontend/dist/. dist/public/

      if [ ! -f dist/public/index.html ]; then
        echo "[ecc-api] ERROR: frontend assets were not copied into backend/api/dist/public"
        exit 1
      fi

      echo "[ecc-api] Build and asset copy complete."
    startCommand: node backend/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ecc-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ALLOWED_ORIGINS
        value: https://ecc-api.onrender.com
      - key: MCP_SERVER_URL
        value: https://ecc-mcp.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false   # Set manually in Render dashboard

  # ── MCP browser-automation service ─────────────────────────────────────
  - type: web
    name: ecc-mcp
    runtime: node
    plan: starter          # Free tier may timeout during Playwright install; use starter
    buildCommand: cd backend/mcp-server && npm install && npm run build
    startCommand: node backend/mcp-server/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ANTHROPIC_API_KEY
        sync: false
